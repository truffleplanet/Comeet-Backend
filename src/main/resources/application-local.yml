# Local 개발 환경 설정
spring:
  config:
    import: optional:file:.env.local[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/comeet?serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true

  sql:
    init:
      mode: always
      schema-locations: classpath:/sql/schema/schema.sql
      data-locations: classpath:/sql/local/seed.sql
      continue-on-error: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:60000}

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:local-dummy-access-key}
        secret-key: ${AWS_SECRET_ACCESS_KEY:local-dummy-secret-key}
      s3:
        bucket: ${AWS_S3_BUCKET:local-dummy-bucket}

logging:
  level:
    root: INFO
    com.backend: DEBUG
    com.backend.mapper: DEBUG
    org.springframework: INFO
    org.springframework.web: DEBUG
    org.mybatis: DEBUG

# CORS 설정 (로컬)
cors:
  allowed-origins: http://localhost:5173,http://localhost:8080

jwt:
  secret: ${JWT_SECRET:local-development-secret-key-must-be-at-least-32-bytes}
  accessTokenExpiration: ${JWT_EXPIRATION:3600000}
  refreshTokenExpiration: ${JWT_REFRESH_EXPIRATION:1209600000}

gemini:
  api-key: ${GEMINI_API_KEY:local-dummy-gemini-key}
  model: ${GEMINI_AI_MODEL:gemini-2.0-flash}

spring.ai:
  openai:
    api-key: ${OPENAI_API_KEY:local-dummy-openai-key}
